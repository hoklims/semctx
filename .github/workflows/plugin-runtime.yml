name: plugin-runtime

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bundled-runtime:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run plugin:check
      - run: bun run typecheck
      - run: bun test plugins/plugin-parity.test.ts packages/mcp-server/test/plugin-runtime.test.ts packages/mcp-server/test/server-metadata.test.ts
