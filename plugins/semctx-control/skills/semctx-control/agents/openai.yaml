interface:
  display_name: "Semctx Control"
  short_description: "Trace and verify repository migrations"
  default_prompt: "Use $semctx-control to identify this project's critical path, trace its L0-L6 impact and authority sources, then compile a fail-closed proof plan before any user-authorized implementation."

dependencies:
  tools:
    - type: "mcp"
      value: "semctx"
      description: "Deterministic semctx repository analysis and control-plane tools"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
