# Standard PR gate: BLOCK fails the check, WARN does not. No secrets, read-only.
# Copy to .github/workflows/semctx.yml in your repository.
name: Semctx

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Least privilege: the action only reads the repository. It never comments on the PR
# and never needs a write token or a secret.
permissions:
  contents: read

jobs:
  semctx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the merge-base with the PR base is available locally.
          # semctx never fetches implicitly.
          fetch-depth: 0

      - uses: hoklims/semctx/packages/github-action@v0.1.0
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.sha }}
          fail-on: block
